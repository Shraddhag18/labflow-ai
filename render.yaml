# Render.com deployment config
# Connect your GitHub repo at https://dashboard.render.com/new/blueprint
# Then set OPENAI_API_KEY in the Render dashboard environment variables.

databases:
  - name: labflow-db
    databaseName: labflow
    user: labflow
    plan: free

services:
  # ── FastAPI ─────────────────────────────────────────────────────────────────
  - type: web
    name: labflow-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.main:app --worker-class uvicorn.workers.UvicornWorker --workers 1 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false             # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: labflow-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: AB_TEST_ENABLED
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: API_SECRET_KEY
        sync: false             # Set manually in Render dashboard
      - key: CORS_ORIGINS
        sync: false             # Set to your dashboard URL after deploying

  # ── Streamlit Dashboard ──────────────────────────────────────────────────────
  - type: web
    name: labflow-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: API_BASE_URL
        fromService:
          name: labflow-api
          type: web
          property: host
          envVarKey: API_BASE_URL
